<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculatrice Scientifique</title>
<style>
body {
    margin: 0;
    background: #121212;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator {
    background: #1f1f1f;
    border-radius: 20px;
    padding: 20px;
    width: 420px;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
}

.display {
    background: #000;
    color: #00ff99;
    font-size: 28px;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    min-height: 50px;
    word-wrap: break-word;
}

.history {
    color: #aaa;
    font-size: 12px;
    height: 60px;
    overflow-y: auto;
    margin-bottom: 10px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
}

button {
    padding: 15px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover { opacity: 0.8; }

/* Couleurs selon type */
.digit { background: #333; color: #fff; }
.operator { background: #ff9500; color: #fff; }
.equal { background: #00c853; color: #fff; }
.clear { background: #d50000; color: #fff; }
.function { background: #1976d2; color: #fff; }
.mode { background: #9c27b0; color: #fff; }

@media (max-width: 450px) {
    .calculator { width: 95%; }
}
</style>
</head>

<body>
<div class="calculator">
    <div class="history" id="history"></div>
    <div class="display" id="display">0</div>

    <div class="buttons">
        <!-- Mode et fonctions à gauche -->
        <button class="mode" id="modeBtn">DEG</button>
        <button class="function" onclick="append('Math.PI')">π</button>
        <button class="function" onclick="append('Math.E')">e</button>
        <button class="function" onclick="append('Math.sqrt(')">√</button>
        <button class="function" onclick="append('Math.pow(')">^</button>
        <button class="clear" onclick="clearDisplay()">C</button>

        <button class="function" onclick="appendTrig('sin')">sin</button>
        <button class="function" onclick="appendTrig('cos')">cos</button>
        <button class="function" onclick="appendTrig('tan')">tan</button>
        <button class="function" onclick="append('Math.log10(')">log</button>
        <button class="function" onclick="append('Math.log(')">ln</button>
        <button onclick="backspace()">⌫</button>

        <!-- Chiffres -->
        <button class="digit" onclick="append('7')">7</button>
        <button class="digit" onclick="append('8')">8</button>
        <button class="digit" onclick="append('9')">9</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="digit" onclick="append('4')">4</button>
        <button class="digit" onclick="append('5')">5</button>
        <button class="digit" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>
        <button class="digit" onclick="append('(')">(</button>
        <button class="digit" onclick="append(')')">)</button>

        <button class="digit" onclick="append('1')">1</button>
        <button class="digit" onclick="append('2')">2</button>
        <button class="digit" onclick="append('3')">3</button>
        <button class="digit" onclick="append('0')">0</button>
        <button class="digit" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");
let history = document.getElementById("history");
let justCalculated = false;
let degMode = true; // true = DEG, false = RAD

const modeBtn = document.getElementById("modeBtn");
modeBtn.addEventListener("click", () => {
    degMode = !degMode;
    modeBtn.innerText = degMode ? "DEG" : "RAD";
});

// Efface après calcul
function append(val) {
    if (justCalculated) {
        display.innerText = val;
        justCalculated = false;
    } else if (display.innerText === "0") {
        display.innerText = val;
    } else {
        display.innerText += val;
    }
}

// Append trig avec gestion DEG/RAD
function appendTrig(func) {
    if(degMode){
        append(`Math.${func}(Math.PI/180*`); // Convertit degrés en radians
    } else {
        append(`Math.${func}(`);
    }
}

function clearDisplay() {
    display.innerText = "0";
}

function backspace() {
    display.innerText = display.innerText.slice(0, -1) || "0";
}

function calculate() {
    try {
        let expr = display.innerText;
        let result = eval(expr);
        history.innerHTML += expr + " = " + result + "<br>";
        display.innerText = result;
        justCalculated = true;
    } catch {
        display.innerText = "Erreur";
        justCalculated = true;
    }
}

// Clavier
document.addEventListener("keydown", function(e){
    if(!isNaN(e.key) || "+-*/().".includes(e.key)) append(e.key);
    if(e.key === "Enter") calculate();
    if(e.key === "Backspace") backspace();
    if(e.key === "Escape") clearDisplay();
});
</script>
</body>
</html>
